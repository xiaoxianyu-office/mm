name: Sync Upstream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and merge upstream
        run: |
          git remote add upstream https://git.lumine.io/mythiccraft/MythicMobs.wiki.git 2>/dev/null || true
          git fetch upstream
          BEFORE=$(git rev-parse HEAD)
          git merge upstream/master --no-edit || git merge upstream/main --no-edit || echo "No changes"
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.CHANGED == 'true'
        run: git push origin master
